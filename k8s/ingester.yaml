# Go ingester as its own Deployment — NOT a sidecar in the DB pod.
#
# replicas: 1 + Recreate is deliberate. The ingester is a timed poller that WRITES:
# the 1m dedup-on-change path (insert only when high_time/low_time advanced) is racy
# under concurrency, so two replicas would double-poll and could double-insert. Never
# scale this >1 and never put an HPA on it. If you ever need HA, add a leader-election
# Lease instead of more replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ge-data-ingester
  namespace: ge-data
spec:
  replicas: 1
  strategy:
    type: Recreate          # never briefly run 2 pollers during a rollout
  selector:
    matchLabels:
      app: ge-data-ingester
  template:
    metadata:
      labels:
        app: ge-data-ingester
    spec:
      containers:
        - name: ingester
          image: ge-data-ingester:latest   # built from ./ingester/Dockerfile; push to your registry
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ge-data-db
                  key: POSTGRES_PASSWORD
            # Reach the DB by Service DNS on the INTERNAL port 5432 (not the host-mapped
            # 5000 from docker-compose). $(VAR) is k8s env interpolation.
            - name: DATABASE_URL
              value: postgresql://ge-data:$(POSTGRES_PASSWORD)@ge-data-db.ge-data.svc.cluster.local:5432/ge-data?sslmode=disable
            - name: USER_AGENT
              valueFrom:
                secretKeyRef:
                  name: ge-data-db
                  key: USER_AGENT
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi

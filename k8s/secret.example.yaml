# Copy to secret.yaml, fill in real values, and apply OUT of band (don't commit secret.yaml).
# Better: use sealed-secrets / SOPS / external-secrets so the encrypted form CAN be committed.
# secret.yaml is gitignored (see k8s/.gitignore).
apiVersion: v1
kind: Secret
metadata:
  name: ge-data-db
  namespace: ge-data
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me-to-something-strong
  USER_AGENT: "ge-data (contact: you@example.com)"

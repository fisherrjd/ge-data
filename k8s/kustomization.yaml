apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ge-data

resources:
  - namespace.yaml
  - db.yaml
  - ingester.yaml

# Schema ConfigMap is generated from the SAME init/01_schema.sql the nix dev DB and
# docker-compose use — single source of truth, no second copy to drift.
configMapGenerator:
  - name: ge-data-schema
    files:
      - ../init/01_schema.sql

# Make the StatefulSet reference the hashed ConfigMap name. (Note: a content change here
# rolls the DB pod, but initdb scripts only re-run on an EMPTY PVC — so editing the schema
# does NOT re-apply it to an existing DB. Migrations are still manual / a future tool.)
generatorOptions:
  disableNameSuffixHash: false

# TimescaleDB as a single-replica StatefulSet.
# - Headless Service gives the pod a stable DNS name: ge-data-db-0.ge-data-db.ge-data.svc
# - volumeClaimTemplates provisions one PVC that persists across pod restarts/reschedules.
# - Schema ConfigMap (generated by kustomize from init/01_schema.sql) is mounted into
#   /docker-entrypoint-initdb.d and runs ONCE, on first boot of an empty PVC. It will NOT
#   re-run for later migrations (same semantics as the docker-compose ./init mount).
apiVersion: v1
kind: Service
metadata:
  name: ge-data-db
  namespace: ge-data
  labels:
    app: ge-data-db
spec:
  clusterIP: None          # headless: stable per-pod DNS, no load-balancing VIP
  selector:
    app: ge-data-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ge-data-db
  namespace: ge-data
spec:
  serviceName: ge-data-db
  replicas: 1
  selector:
    matchLabels:
      app: ge-data-db
  template:
    metadata:
      labels:
        app: ge-data-db
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb:2.17.2-pg16   # pinned; never :latest
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ge-data
            - name: POSTGRES_USER
              value: ge-data
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ge-data-db
                  key: POSTGRES_PASSWORD
            # Init the cluster in a SUBDIR of the mount. Mounting a PVC directly at
            # /var/lib/postgresql/data can leave a lost+found that breaks initdb; a
            # subdir sidesteps it. This is the standard k8s Postgres pattern.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: schema
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ge-data", "-d", "ge-data"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "ge-data", "-d", "ge-data"]
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: schema
          configMap:
            name: ge-data-schema
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        # storageClassName: local-path   # k3s default; uncomment/change if needed
